name: CI/CD Pipeline

# Déclenchement de la pipeline lors d'un push sur la branche main
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Build And Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build --pull

      - name: Backend sanity checks
        run: |
          docker compose run --rm back php -v
          docker compose run --rm -e APP_ENV=prod -e APP_DEBUG=0 back php bin/console doctrine:migrations:status --no-interaction

      - name: Frontend production build
        run: |
          cd front
          corepack enable
          pnpm install --frozen-lockfile
          pnpm run build

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER || vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH }}
          port: ${{ secrets.VPS_PORT || vars.VPS_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH || vars.VPS_APP_PATH }}

            # Allow git operations in this path even if ownership differs
            git config --global --add safe.directory "$(pwd)"

            # Sync code
            git fetch --all
            git checkout main
            git pull --ff-only origin main

            # Rebuild and restart with cache-friendly defaults
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker-compose build --parallel back front
            docker-compose up -d --remove-orphans back front

            # Run migrations if needed
            docker-compose exec -T -e APP_ENV=prod -e APP_DEBUG=0 back php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
