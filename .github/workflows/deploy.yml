name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_BASE: ghcr.io/mattisbbn/cours-vue

jobs:
  test-and-build:
    name: Build And Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and load Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: false
          load: true
          tags: ${{ env.IMAGE_BASE }}/back:latest
          cache-from: type=gha,scope=back
          cache-to: type=gha,mode=max,scope=back

      - name: Build and load Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./front
          push: false
          load: true
          tags: ${{ env.IMAGE_BASE }}/front:latest
          cache-from: type=gha,scope=front
          cache-to: type=gha,mode=max,scope=front

      - name: Backend sanity checks
        run: |
          docker compose run --rm back php -v
          docker compose run --rm -e APP_ENV=prod -e APP_DEBUG=0 back php bin/console doctrine:migrations:status --no-interaction

      - name: Push Docker images to GHCR
        run: docker compose push

  deploy:
    name: Deploy to VPS
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            git checkout main
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
