name: CI/CD Pipeline

# Déclenchement de la pipeline lors d'un push sur la branche main
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Build And Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker-compose -f docker-compose.yml build --pull

      - name: Backend sanity checks
        run: |
          docker-compose run --rm back php -v
          docker-compose run --rm back php bin/console doctrine:migrations:status --no-interaction

      - name: Frontend production build
        run: |
          cd front
          npm ci
          npm run build

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}

            # Sync code
            git fetch --all
            git checkout main
            git pull --ff-only origin main

            # Rebuild and restart
            docker-compose build --pull back front
            docker-compose up -d --force-recreate back front

            # Cleanup old dangling images
            docker image prune -f
