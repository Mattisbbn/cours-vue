services:
  back:
    build: ./back
    ports:
      - "8000:80"
    environment:
      # On force l'URL SQLite vers le dossier var/
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"

  # Frontend Vue
  front:
    build: ./front
    ports:
      - "8080:80"
    depends_on:
      - back
